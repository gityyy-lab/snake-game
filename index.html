<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* animated star background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:stars 40s linear infinite;
opacity:0.2;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-2000px)}
}

#startScreen{
text-align:center;
}

#playBtn{
background:#22c55e;
border:none;
padding:12px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

#gameContainer{
display:none;
text-align:center;
}

canvas{
background:#020617;
border:3px solid #22c55e;
box-shadow:0 0 20px #22c55e;
}

</style>
</head>

<body>

<div id="startScreen">
<h1>🐍 Snake Game</h1>
<button id="playBtn">Play</button>
</div>

<div id="gameContainer">
<canvas id="game" width="400" height="400"></canvas>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let snake=[{x:200,y:200}];
let snakeLength=5;

let dx=2;
let dy=0;

let food=randomFood();

let score=0;
let running=false;

const eatSound=new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
const music=new Audio("https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3");

music.loop=true;
music.volume=0.3;

document.getElementById("playBtn").onclick=startGame;

function startGame(){

document.getElementById("startScreen").style.display="none";
document.getElementById("gameContainer").style.display="block";

snake=[{x:200,y:200}];
snakeLength=5;

dx=2;
dy=0;

score=0;

food=randomFood();

running=true;

music.play();

requestAnimationFrame(loop);

}

function randomFood(){

return{
x:Math.random()*360+20,
y:Math.random()*360+20
};

}

function loop(){

if(!running)return;

update();
draw();

requestAnimationFrame(loop);

}

function update(){

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);

/* apple collision */

if(Math.hypot(head.x-food.x, head.y-food.y)<12){

score++;
snakeLength++;

eatSound.play();

food=randomFood();

}

/* maintain snake size */

while(snake.length>snakeLength){
snake.pop();
}

/* wall collision */

if(head.x<0||head.x>400||head.y<0||head.y>400){
gameOver();
}

/* self collision */

for(let i=1;i<snake.length;i++){
if(Math.hypot(head.x-snake[i].x, head.y-snake[i].y)<8){
gameOver();
}
}

}

function draw(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,400,400);

/* draw snake */

snake.forEach((part,i)=>{

ctx.fillStyle=i===0?"#4ade80":"#22c55e";

ctx.beginPath();
ctx.arc(part.x,part.y,8,0,Math.PI*2);
ctx.fill();

/* eyes */

if(i===0){

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(part.x-3,part.y-3,2,0,Math.PI*2);
ctx.arc(part.x+3,part.y-3,2,0,Math.PI*2);
ctx.fill();

}

});

/* apple pulse */

let pulse=8+Math.sin(Date.now()/150)*2;

ctx.fillStyle="red";

ctx.beginPath();
ctx.arc(food.x,food.y,pulse,0,Math.PI*2);
ctx.fill();

/* apple leaf */

ctx.fillStyle="green";

ctx.beginPath();
ctx.ellipse(food.x+5,food.y-8,3,6,Math.PI/4,0,Math.PI*2);
ctx.fill();

}

function gameOver(){

running=false;

music.pause();

alert("Game Over!\n\nApples eaten: "+score);

location.reload();

}

/* keyboard controls */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp"){dx=0;dy=-2;}
if(e.key==="ArrowDown"){dx=0;dy=2;}
if(e.key==="ArrowLeft"){dx=-2;dy=0;}
if(e.key==="ArrowRight"){dx=2;dy=0;}

});

/* swipe controls */

let startX,startY;

canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{

let dxTouch=e.changedTouches[0].clientX-startX;
let dyTouch=e.changedTouches[0].clientY-startY;

if(Math.abs(dxTouch)>Math.abs(dyTouch)){

if(dxTouch>0){dx=2;dy=0;}
else{dx=-2;dy=0;}

}else{

if(dyTouch>0){dx=0;dy=2;}
else{dx=0;dy=-2;}

}

});

</script>

</body>
</html>
